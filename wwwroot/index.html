<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Show Control - Sélection</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #121212;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            background: #1e1e1e;
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 500px;
            width: 90%;
        }

        h1 {
            color: #00d2ff;
            margin-bottom: 30px;
        }

        .choice-box {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .btn {
            padding: 20px;
            font-size: 1.2em;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: block;
        }

        .btn-admin {
            background: #00d2ff;
            color: black;
        }

            .btn-admin:hover {
                background: #0099cc;
                transform: scale(1.02);
            }

        .btn-client {
            background: #00ff88;
            color: black;
        }

            .btn-client:hover {
                background: #00cc66;
                transform: scale(1.02);
            }

        .qr-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #333;
        }

        #qrContainer {
            background: white;
            padding: 15px;
            display: inline-block;
            border-radius: 10px;
            margin: 15px 0;
        }

        #ipDisplay {
            font-family: monospace;
            color: #00ff88;
            font-size: 1.1em;
            background: #111;
            padding: 5px 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SHOW CONTROL</h1>

        <div class="choice-box">
            <a href="admin.html" class="btn btn-admin">💻 ACCÈS ADMINISTRATEUR</a>
            <a href="public.html" class="btn btn-client">📱 ACCÈS CLIENT / MOBILE</a>
        </div>

        <div class="qr-section">
            <p>Scannez pour l'accès mobile :</p>
            <div id="qrContainer">
                <img id="qrCodeImg" src="" alt="QR Code" style="display:none; width: 180px; height: 180px;">
                <div id="qrLoading" style="color:black; font-weight:bold;">Génération...</div>
            </div>
            <p>Ou utilisez l'adresse :<br><span id="ipDisplay">Recherche...</span></p>
        </div>
    </div>

    <script>
        async function loadConnectionInfo() {
            try {
                const res = await fetch('/api/show/ip');
                const data = await res.json();
                const fullUrl = `http://${data.ip}:5000`;

                document.getElementById('ipDisplay').innerText = fullUrl;
                const qrImg = document.getElementById('qrCodeImg');
                qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(fullUrl)}`;

                qrImg.onload = () => {
                    document.getElementById('qrLoading').style.display = 'none';
                    qrImg.style.display = 'block';
                };
            } catch (e) {
                document.getElementById('ipDisplay').innerText = "Erreur réseau";
            }
        }
        loadConnectionInfo();
    </script>
</body>
</html>
